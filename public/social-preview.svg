<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <!-- Crescent moon mask: large circle minus offset circle -->
    <mask id="crescent">
      <rect width="1200" height="630" fill="black"/>
      <circle cx="980" cy="230" r="140" fill="white"/>
      <circle cx="1035" cy="178" r="118" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative concentric rings (right) -->
  <circle cx="1050" cy="315" r="320" fill="none" stroke="#4ade80" stroke-opacity="0.05" stroke-width="80"/>
  <circle cx="1050" cy="315" r="210" fill="none" stroke="#4ade80" stroke-opacity="0.05" stroke-width="60"/>
  <circle cx="1050" cy="315" r="120" fill="none" stroke="#4ade80" stroke-opacity="0.07" stroke-width="40"/>

  <!-- Crescent moon -->
  <rect width="1200" height="630" fill="#4ade80" fill-opacity="0.18" mask="url(#crescent)"/>

  <!-- Star (5-pointed) centred at 1000,170, outer r=40, inner r=16 -->
  <polygon
    points="1000,130 1009,157 1038,158 1015,175 1024,202 1000,186 976,202 985,175 962,158 991,157"
    fill="#4ade80" fill-opacity="0.25"/>

  <!-- Left accent bar -->
  <rect x="64" y="128" width="4" height="374" rx="2" fill="#4ade80" fill-opacity="0.55"/>

  <!-- Eyebrow label -->
  <text x="88" y="165"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="19" font-weight="600" letter-spacing="3" fill="#86efac">
    COMMUNITY PROJECTS &amp; TRANSPARENCY
  </text>

  <!-- Main title -->
  <text x="88" y="275"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88" font-weight="700" fill="#ffffff">
    Islamic Center
  </text>
  <text x="88" y="378"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88" font-weight="700" fill="#ffffff">
    of Moscow
  </text>

  <!-- Description -->
  <text x="88" y="448"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="26" fill="#bbf7d0">
    Follow current projects, donation receipts &amp; updates.
  </text>
  <text x="88" y="485"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="26" fill="#bbf7d0">
    Full financial transparency, always.
  </text>

  <!-- URL pill -->
  <rect x="84" y="522" width="238" height="48" rx="24"
    fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.35" stroke-width="1"/>
  <text x="203" y="553"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22" fill="#4ade80" text-anchor="middle">
    icmoscow.com
  </text>
</svg>
