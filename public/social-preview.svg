<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient: deep green top-left to near-black bottom-right -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>

    <!-- Soft glow halo behind the dome -->
    <radialGradient id="domeGlow" cx="50%" cy="50%" r="50%" gradientUnits="userSpaceOnUse"
      x1="920" y1="360" x2="920" y2="360">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>

    <!-- Dome left-side shine -->
    <radialGradient id="domeShine" cx="820" cy="300" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold finial gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a87c10"/>
      <stop offset="40%" stop-color="#d4aa30"/>
      <stop offset="100%" stop-color="#a87c10"/>
    </linearGradient>

    <!-- Clip dome body for ribbing -->
    <clipPath id="domeClip">
      <path d="M748,482 C748,298 875,210 920,210 C965,210 1092,298 1092,482 Z"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dark overlay on left panel to separate text from dome -->
  <rect x="0" y="0" width="710" height="630" fill="#000" fill-opacity="0.06"/>

  <!-- ── DOME HALO ── -->
  <ellipse cx="920" cy="380" rx="290" ry="260" fill="#22c55e" fill-opacity="0.05"/>
  <ellipse cx="920" cy="380" rx="200" ry="180" fill="#22c55e" fill-opacity="0.04"/>

  <!-- ── DOME BODY ── -->
  <!-- Main fill -->
  <path d="M748,482 C748,298 875,210 920,210 C965,210 1092,298 1092,482 Z"
        fill="#155427"/>

  <!-- Ribbing bands (horizontal, clipped to dome silhouette) -->
  <g clip-path="url(#domeClip)" fill="#0b3617" fill-opacity="1">
    <!-- Bands narrow progressively toward the apex -->
    <rect x="700" y="464" width="440" height="16"/>
    <rect x="700" y="444" width="440" height="14"/>
    <rect x="700" y="425" width="440" height="13"/>
    <rect x="700" y="408" width="440" height="11"/>
    <rect x="700" y="392" width="440" height="10"/>
    <rect x="700" y="378" width="440" height="9"/>
    <rect x="700" y="365" width="440" height="8"/>
    <rect x="700" y="353" width="440" height="8"/>
    <rect x="700" y="342" width="440" height="7"/>
    <rect x="700" y="332" width="440" height="7"/>
    <rect x="700" y="323" width="440" height="6"/>
    <rect x="700" y="314" width="440" height="6"/>
    <rect x="700" y="306" width="440" height="5"/>
    <rect x="700" y="299" width="440" height="5"/>
    <rect x="700" y="292" width="440" height="4"/>
    <rect x="700" y="286" width="440" height="4"/>
    <rect x="700" y="280" width="440" height="4"/>
    <rect x="700" y="274" width="440" height="3"/>
    <rect x="700" y="269" width="440" height="3"/>
    <rect x="700" y="264" width="440" height="3"/>
    <rect x="700" y="260" width="440" height="2"/>
    <rect x="700" y="256" width="440" height="2"/>
    <rect x="700" y="252" width="440" height="2"/>
    <rect x="700" y="248" width="440" height="2"/>
    <rect x="700" y="244" width="440" height="2"/>
    <rect x="700" y="241" width="440" height="1"/>
    <rect x="700" y="238" width="440" height="1"/>
    <rect x="700" y="235" width="440" height="1"/>
    <rect x="700" y="232" width="440" height="1"/>
    <rect x="700" y="229" width="440" height="1"/>
    <rect x="700" y="227" width="440" height="1"/>
  </g>

  <!-- Left-side dome shine overlay (clipped) -->
  <path d="M748,482 C748,298 875,210 920,210 C965,210 1092,298 1092,482 Z"
        fill="url(#domeShine)"/>

  <!-- Dome outline edge (subtle border) -->
  <path d="M748,482 C748,298 875,210 920,210 C965,210 1092,298 1092,482"
        fill="none" stroke="#0a2e12" stroke-width="2.5"/>

  <!-- ── BASE STEPS ── -->
  <!-- Neck band (sits between dome curve and Step 1) -->
  <rect x="760" y="480" width="320" height="6" rx="2" fill="#0f4822"/>

  <!-- Step 1 (narrowest, closest to dome) -->
  <rect x="756" y="484" width="328" height="28" rx="3" fill="#0e4420"/>

  <!-- Arched windows in Step 1 — 3 niches -->
  <path d="M848,510 L848,496 A12,10,0,0,1,872,496 L872,510 Z" fill="#000" fill-opacity="0.28"/>
  <path d="M908,510 L908,496 A12,10,0,0,1,932,496 L932,510 Z" fill="#000" fill-opacity="0.28"/>
  <path d="M968,510 L968,496 A12,10,0,0,1,992,496 L992,510 Z" fill="#000" fill-opacity="0.28"/>

  <!-- Step 2 -->
  <rect x="736" y="510" width="368" height="30" rx="3" fill="#0b3a1c"/>

  <!-- Arched windows in Step 2 — 5 niches -->
  <path d="M793,538 L793,526 A10,9,0,0,1,813,526 L813,538 Z" fill="#000" fill-opacity="0.22"/>
  <path d="M840,538 L840,526 A10,9,0,0,1,860,526 L860,538 Z" fill="#000" fill-opacity="0.22"/>
  <path d="M910,538 L910,526 A10,9,0,0,1,930,526 L930,538 Z" fill="#000" fill-opacity="0.22"/>
  <path d="M980,538 L980,526 A10,9,0,0,1,1000,526 L1000,538 Z" fill="#000" fill-opacity="0.22"/>
  <path d="M1027,538 L1027,526 A10,9,0,0,1,1047,526 L1047,538 Z" fill="#000" fill-opacity="0.22"/>

  <!-- Step 3 -->
  <rect x="710" y="538" width="420" height="32" rx="3" fill="#093218"/>

  <!-- Platform base -->
  <rect x="680" y="568" width="480" height="38" rx="4" fill="#072912"/>

  <!-- Subtle base shadow/ground line -->
  <rect x="650" y="604" width="540" height="6" rx="3" fill="#000" fill-opacity="0.25"/>

  <!-- ── FINIAL ── -->
  <!-- Pole (tapers: wider at dome, narrower at top) -->
  <rect x="918" y="152" width="4" height="60" rx="2" fill="url(#goldGrad)"/>
  <rect x="917.5" y="180" width="5" height="30" rx="1" fill="url(#goldGrad)"/>

  <!-- Sphere at pole top -->
  <circle cx="920" cy="150" r="11" fill="url(#goldGrad)"/>
  <circle cx="916" cy="147" r="4" fill="#f0cc50" fill-opacity="0.5"/><!-- shine -->

  <!-- Crescent moon at apex -->
  <!-- Outer circle -->
  <circle cx="920" cy="132" r="14" fill="url(#goldGrad)"/>
  <!-- Inner cut (green matches background at that spot) -->
  <circle cx="926" cy="128" r="11.5" fill="#155427"/>

  <!-- Small 5-pointed star beside crescent -->
  <polygon
    points="937,126 938.4,130.3 942.9,130.4 939.5,133 940.7,137.4 937,135 933.3,137.4 934.5,133 931.1,130.4 935.6,130.3"
    fill="#d4aa30" fill-opacity="0.85"/>

  <!-- ── LEFT TEXT CONTENT ── -->

  <!-- Vertical accent bar -->
  <rect x="64" y="128" width="4" height="374" rx="2" fill="#4ade80" fill-opacity="0.55"/>

  <!-- Eyebrow / category label -->
  <text x="88" y="165"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="19" font-weight="600" letter-spacing="3" fill="#86efac">
    COMMUNITY PROJECTS &amp; TRANSPARENCY
  </text>

  <!-- Primary title (two lines) -->
  <text x="88" y="278"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="86" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Islamic Center
  </text>
  <text x="88" y="376"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="86" font-weight="700" fill="#ffffff" letter-spacing="-1">
    of Moscow
  </text>

  <!-- Sub-tagline -->
  <text x="88" y="445"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="25" fill="#bbf7d0">
    Follow current projects, donation receipts &amp; updates.
  </text>
  <text x="88" y="480"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="25" fill="#bbf7d0">
    Full financial transparency, always.
  </text>

  <!-- URL pill badge -->
  <rect x="84" y="516" width="242" height="48" rx="24"
    fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.38" stroke-width="1.5"/>
  <text x="205" y="547"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22" font-weight="500" fill="#4ade80" text-anchor="middle">
    icmoscow.com
  </text>
</svg>
