<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="canonical" href="https://icmoscow.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Islamic Center of Moscow — Community Projects</title>
  <meta name="description" content="Follow Islamic Center of Moscow's community projects, donation receipts, and updates. Full financial transparency, always.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://icmoscow.com">
  <meta property="og:site_name" content="Islamic Center of Moscow">
  <meta property="og:title" content="Islamic Center of Moscow — Community Projects">
  <meta property="og:description" content="Follow current projects, donation receipts, and community updates. Full financial transparency, always.">
  <meta property="og:image" content="https://icmoscow.com/social-preview.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/svg+xml">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Islamic Center of Moscow — Community Projects">
  <meta name="twitter:description" content="Follow current projects, donation receipts, and community updates. Full financial transparency, always.">
  <meta name="twitter:image" content="https://icmoscow.com/social-preview.svg">

  <script>
    ; (function () {
      var search = window.location.search.slice(1)
      if (search.charAt(0) === '/') {
        var parts = search.split('&')
        var path = parts.shift()
        var query = parts.join('&').replace(/~and~/g, '&')
        window.history.replaceState(
          null, null,
          path + (query ? '?' + query : '') + window.location.hash
        )
      }
    })()
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
